<div class="verify-container">

  <!-- Loading -->
  <div *ngIf="loading" class="loading">
    🔄 Verifying certificate...
  </div>


  <!-- Error -->
  <div *ngIf="error" class="error">
    ❌ Invalid or Not Found Certificate
  </div>


  <!-- Success -->
  <div *ngIf="data" class="card">

    <h2>✅ Certificate Verified</h2>

    <div class="row">
      <label>Name</label>
      <span>{{ data.name || data.student_name || data.staff_name || data.employee_name }}</span>
    </div>

    <div class="row">
      <label>Certificate No</label>
      <span>{{ data.certificate_no }}</span>
    </div>

    <div class="row">
      <label>From</label>
      <span>{{ data.from_date | date:'dd/MM/yyyy' }}</span>
    </div>

    <div class="row">
      <label>To</label>
      <span>{{ data.to_date | date:'dd/MM/yyyy' }}</span>
    </div>

    <div class="success-badge">
      🎓 Authentic Certificate
    </div>

  </div>

</div>
